services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: quiz_platform
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      target: production
    restart: unless-stopped
    environment:
      NODE_ENV: development
      PORT: 3000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/quiz_platform?schema=public
      CORS_ORIGIN: http://localhost:5173
      # Local-development placeholders only. Real deployments must supply these
      # from the environment / a secret store, never from this file.
      JWT_ACCESS_SECRET: local-development-access-secret-not-for-production
      JWT_REFRESH_SECRET: local-development-refresh-secret-not-for-production
      JWT_ACCESS_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      EMAIL_VERIFICATION_SECRET: local-development-verification-secret-not-for-prod
      EMAIL_VERIFICATION_EXPIRES_IN: 24h
      PASSWORD_RESET_SECRET: local-development-password-reset-secret-not-for-prod
      PASSWORD_RESET_EXPIRES_IN: 1h
      FRONTEND_URL: http://localhost:5173
    ports:
      - '3000:3000'
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3000/health || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
      target: production
      args:
        VITE_API_URL: http://localhost:3000/api/v1
    restart: unless-stopped
    ports:
      - '5173:80'
    depends_on:
      - backend

volumes:
  postgres_data:
